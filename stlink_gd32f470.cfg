# 选择调试器接口: ST-Link
source [find interface/stlink.cfg]

# 选择传输协议: SWD
transport select hla_swd

# 设置芯片的 CPUTAPID
# GD32F470 的 Cortex-M4 内核 ID 通常与 STM32F4 相同 (0x2ba01477)
# 如果 OpenOCD 报错识别不到芯片，可以尝试将其设置为 0 (忽略 ID 检查)
set CPUTAPID 0x2ba01477

# 选择目标芯片配置文件
# GD32F470 的寄存器映射和调试逻辑与 STM32F4x 兼容
source [find target/stm32f4x.cfg]

# 设置下载速率 (可以根据稳定性调整，2000-8000 之间)
adapter speed 4000